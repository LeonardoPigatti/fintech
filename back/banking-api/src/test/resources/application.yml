spring:
  datasource:
    url: jdbc:tc:postgresql:16-alpine:///banking_db
    driver-class-name: org.testcontainers.jdbc.ContainerDatabaseDriver
    username: banking_user
    password: banking_pass
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  data:
    redis:
      host: localhost
      port: 6379
  kafka:
    bootstrap-servers: localhost:9092

server:
  port: 8080
  servlet:
    context-path: /api/v1

jwt:
  secret: test-chave-secreta-super-segura-aqui-minimo-256-bits-hs256
  expiration: 86400000
  refresh-expiration: 604800000

logging:
  level:
    com.fintech.banking: DEBUG
