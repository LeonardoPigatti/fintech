<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Rounded square background -->
  <rect width="64" height="64" rx="14" fill="#e8611a"/>

  <!-- Vault door body -->
  <rect x="12" y="14" width="40" height="32" rx="5" fill="none" stroke="#fff" stroke-width="4.5"/>

  <!-- Vault dial ring -->
  <circle cx="32" cy="30" r="10" fill="none" stroke="#fff" stroke-width="4.5"/>

  <!-- Dial center dot -->
  <circle cx="32" cy="30" r="3" fill="#fff"/>

  <!-- Dial tick marks (N/S/E/W) -->
  <line x1="32" y1="20" x2="32" y2="17" stroke="#fff" stroke-width="3" stroke-linecap="round"/>
  <line x1="32" y1="40" x2="32" y2="43" stroke="#fff" stroke-width="3" stroke-linecap="round"/>
  <line x1="22" y1="30" x2="19" y2="30" stroke="#fff" stroke-width="3" stroke-linecap="round"/>
  <line x1="42" y1="30" x2="45" y2="30" stroke="#fff" stroke-width="3" stroke-linecap="round"/>

  <!-- Vault bolts (bottom) -->
  <rect x="46" y="46" width="5" height="9" rx="2" fill="#fff"/>
  <rect x="13" y="46" width="5" height="9" rx="2" fill="#fff"/>
</svg>
